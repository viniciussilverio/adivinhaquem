<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quem Sou Eu?</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    transition:.25s;
}

#app{
    width:100%;
    max-width:800px;
    padding:20px;
}

button,select{
    font-size:18px;
    padding:12px 18px;
    border:none;
    border-radius:10px;
}

#word{
    font-size:64px;
    font-weight:bold;
    margin:25px 0;
}

.hidden{
    display:none;
}

.good{
    background:#178848;
}

.bad{
    background:#982222;
}

#timer{
    font-size:32px;
}

.small{
    opacity:.8;
}

#debug{
    margin-top:10px;
    opacity:.6;
    font-size:13px;
}
</style>
</head>
<body>

<div id="app">

    <div id="menu">

        <h1>Quem Sou Eu?</h1>

        <p>
            Incline rapidamente para frente = Acertou
            <br>
            Incline rapidamente para trás = Passou
        </p>

        <select id="cat"></select>

        <br><br>

        <button id="start">
            Jogar
        </button>

    </div>

    <div id="game" class="hidden">

        <div id="timer">60</div>

        <div class="small">
            Frente = Acertou | Trás = Passou
        </div>

        <div id="word">...</div>

        <div id="score"></div>

        <div id="debug"></div>

    </div>

    <div id="end" class="hidden">

        <h2>Fim!</h2>

        <p id="result"></p>

        <div id="lists"></div>

        <br>

        <button onclick="location.reload()">
            Jogar novamente
        </button>

    </div>

</div>

<script>

const db = {

    Animais:[
        "Leão","Elefante","Cachorro","Gato","Girafa",
        "Zebra","Pinguim","Tubarão","Baleia","Macaco"
    ],

    Filmes:[
        "Titanic","Avatar","Matrix","Interestelar",
        "Gladiador","Shrek","Toy Story","Frozen",
        "Batman","Superman"
    ],

    Objetos:[
        "Computador","Celular","Cadeira","Caneta",
        "Livro","Martelo","Relógio","Violão",
        "Microfone","Guarda-chuva"
    ],

    Comidas:[
        "Pizza","Sushi","Hambúrguer","Feijoada",
        "Lasanha","Sorvete","Chocolate",
        "Pipoca","Pastel","Maçã"
    ]
};

const menu = document.getElementById("menu");
const game = document.getElementById("game");
const endDiv = document.getElementById("end");

const word = document.getElementById("word");
const score = document.getElementById("score");
const timerEl = document.getElementById("timer");
const result = document.getElementById("result");
const lists = document.getElementById("lists");
const debug = document.getElementById("debug");

const sel = document.getElementById("cat");

Object.keys(db).forEach(c=>{
    sel.add(new Option(c,c));
});

let words=[];
let current="";

let ok=[];
let skip=[];

let timer;
let time=60;

let actionLock=false;

function shuffle(a){

    for(let i=a.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1));

        [a[i],a[j]]=[a[j],a[i];
    }
}

function beep(freq){

    try{

        const ctx=new(
            window.AudioContext ||
            window.webkitAudioContext
        )();

        const osc=ctx.createOscillator();
        const gain=ctx.createGain();

        osc.frequency.value=freq;

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start();

        gain.gain.exponentialRampToValueAtTime(
            0.0001,
            ctx.currentTime+0.15
        );

        osc.stop(ctx.currentTime+0.15);

    }catch(e){}
}

function vib(){

    if(navigator.vibrate){

        navigator.vibrate(120);
    }
}

function nextWord(){

    document.body.className="";

    if(words.length===0){

        end();
        return;
    }

    current=words.pop();

    word.textContent=current;

    score.textContent=
        `Acertos: ${ok.length} | Passou: ${skip.length}`;
}

function registerAnswer(type){

    if(actionLock) return;

    actionLock=true;

    if(type==="ok"){

        ok.push(current);

        document.body.className="good";

        beep(900);

    }else{

        skip.push(current);

        document.body.className="bad";

        beep(250);
    }

    vib();

    setTimeout(()=>{

        nextWord();

        setTimeout(()=>{
            actionLock=false;
        },800);

    },400);
}

function end(){

    clearInterval(timer);

    game.classList.add("hidden");
    endDiv.classList.remove("hidden");

    result.textContent=
        `Acertos: ${ok.length} | Passou: ${skip.length}`;

    lists.innerHTML=`
        <h3>Acertou</h3>
        <p>${ok.join(", ")}</p>

        <h3>Passou</h3>
        <p>${skip.join(", ")}</p>
    `;
}

function startGame(){

    menu.classList.add("hidden");
    game.classList.remove("hidden");

    words=[...db[sel.value]];

    shuffle(words);

    nextWord();

    timer=setInterval(()=>{

        time--;

        timerEl.textContent=time;

        if(time<=0){

            end();
        }

    },1000);
}

function enableMotionEngine(){

    let lastTrigger=0;

    window.addEventListener("devicemotion",e=>{

        const now=Date.now();

        if(now-lastTrigger<1300){
            return;
        }

        let gyroSpeed=0;

        if(e.rotationRate){

            const b=e.rotationRate.beta || 0;
            const g=e.rotationRate.gamma || 0;

            gyroSpeed=Math.abs(b)>Math.abs(g)
                ? b
                : g;

            debug.textContent=
                `gyro ${gyroSpeed.toFixed(1)}`;

            if(gyroSpeed > 120){

                lastTrigger=now;

                registerAnswer("ok");

                return;
            }

            if(gyroSpeed < -120){

                lastTrigger=now;

                registerAnswer("skip");

                return;
            }
        }

        const gravity=e.accelerationIncludingGravity;

        if(!gravity) return;

        const strongest=
            Math.abs(gravity.x)>
            Math.abs(gravity.y)
                ? gravity.x
                : gravity.y;

        debug.textContent=
            `acc ${strongest.toFixed(1)}`;

        if(strongest>8){

            lastTrigger=now;

            registerAnswer("ok");

        }else if(strongest<-8){

            lastTrigger=now;

            registerAnswer("skip");
        }

    });
}

document.getElementById("start").onclick=async()=>{

    try{

        if(
            typeof DeviceMotionEvent!=="undefined" &&
            typeof DeviceMotionEvent.requestPermission==="function"
        ){

            const permission=
                await DeviceMotionEvent.requestPermission();

            if(permission!=="granted"){
                return;
            }
        }

        enableMotionEngine();

        startGame();

    }catch(err){

        console.error(err);

        alert(
            "Não foi possível acessar os sensores."
        );
    }
};

</script>

</body>
</html>
