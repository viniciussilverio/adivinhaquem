<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quem Sou Eu?</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    transition:.25s;
}

#app{
    width:100%;
    max-width:700px;
    padding:20px;
}

button,select{
    font-size:18px;
    padding:12px 18px;
    border:none;
    border-radius:8px;
}

#word{
    font-size:64px;
    font-weight:bold;
    margin:25px 0;
}

.hidden{
    display:none;
}

.good{
    background:#1f8b4c;
}

.bad{
    background:#8b1f1f;
}

.small{
    opacity:.8;
}

#timer{
    font-size:30px;
}

#debug{
    margin-top:12px;
    font-size:13px;
    opacity:.7;
}
</style>
</head>
<body>

<div id="app">

    <div id="menu">
        <h1>Quem Sou Eu?</h1>

        <p>
            Incline para frente = Acertou
            <br>
            Incline para trás = Passou
        </p>

        <select id="cat"></select>

        <br><br>

        <button id="start">
            Jogar
        </button>
    </div>

    <div id="game" class="hidden">

        <div id="timer">60</div>

        <div class="small">
            Frente = Acertou | Trás = Passou
        </div>

        <div id="word">...</div>

        <div id="score"></div>

        <div id="debug"></div>

    </div>

    <div id="end" class="hidden">

        <h2>Fim!</h2>

        <p id="result"></p>

        <div id="lists"></div>

        <br>

        <button onclick="location.reload()">
            Jogar novamente
        </button>

    </div>

</div>

<script>

const db = {

    "Animais":[
        "Leão","Elefante","Cachorro","Gato","Girafa",
        "Zebra","Pinguim","Tubarão","Baleia","Macaco"
    ],

    "Filmes":[
        "Titanic","Avatar","Matrix","Interestelar",
        "Gladiador","Shrek","Toy Story","Frozen",
        "Batman","Superman"
    ],

    "Objetos":[
        "Computador","Celular","Cadeira","Caneta",
        "Livro","Martelo","Relógio","Violão",
        "Microfone","Guarda-chuva"
    ],

    "Comidas":[
        "Pizza","Sushi","Hambúrguer","Feijoada",
        "Lasanha","Sorvete","Chocolate",
        "Pipoca","Pastel","Maçã"
    ]
};

const sel=document.getElementById("cat");

Object.keys(db).forEach(c=>{
    sel.add(new Option(c,c));
});

const menu=document.getElementById("menu");
const game=document.getElementById("game");
const endDiv=document.getElementById("end");

const word=document.getElementById("word");
const score=document.getElementById("score");
const timerEl=document.getElementById("timer");
const result=document.getElementById("result");
const lists=document.getElementById("lists");
const debug=document.getElementById("debug");

let words=[];
let current="";

let ok=[];
let skip=[];

let timer;
let time=60;

function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

function beep(freq){

    try{

        const ctx=
            new (
                window.AudioContext ||
                window.webkitAudioContext
            )();

        const osc=ctx.createOscillator();
        const gain=ctx.createGain();

        osc.frequency.value=freq;

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start();

        gain.gain.exponentialRampToValueAtTime(
            0.0001,
            ctx.currentTime+0.15
        );

        osc.stop(ctx.currentTime+0.15);

    }catch(e){}
}

function vib(){

    if(navigator.vibrate){
        navigator.vibrate(120);
    }
}

function nextWord(){

    document.body.className="";

    if(words.length===0){
        end();
        return;
    }

    current=words.pop();

    word.textContent=current;

    score.textContent=
        `Acertos: ${ok.length} | Passou: ${skip.length}`;
}

function registerAnswer(type){

    if(type==="ok"){

        ok.push(current);

        document.body.className="good";

        beep(900);

    }else{

        skip.push(current);

        document.body.className="bad";

        beep(220);
    }

    vib();

    setTimeout(nextWord,500);
}

function end(){

    clearInterval(timer);

    game.classList.add("hidden");
    endDiv.classList.remove("hidden");

    result.textContent=
        `Acertos: ${ok.length} | Passou: ${skip.length}`;

    lists.innerHTML=`
        <h3>Acertou</h3>
        <p>${ok.join(", ")}</p>

        <h3>Passou</h3>
        <p>${skip.join(", ")}</p>
    `;
}

function startGame(){

    menu.classList.add("hidden");
    game.classList.remove("hidden");

    words=[...db[sel.value]];

    shuffle(words);

    nextWord();

    timer=setInterval(()=>{

        time--;

        timerEl.textContent=time;

        if(time<=0){
            end();
        }

    },1000);
}

function enableSensors(){

    let calibrated=false;

    let neutral=0;
    let axis="y";

    let filteredX=0;
    let filteredY=0;
    let filteredZ=0;

    let state="READY";

    window.addEventListener("devicemotion",e=>{

        const g=e.accelerationIncludingGravity;

        if(!g) return;

        filteredX=filteredX*0.8+g.x*0.2;
        filteredY=filteredY*0.8+g.y*0.2;
        filteredZ=filteredZ*0.8+g.z*0.2;

        if(!calibrated){

            const axes=[
                {name:"x",value:filteredX},
                {name:"y",value:filteredY},
                {name:"z",value:filteredZ}
            ];

            axes.sort((a,b)=>
                Math.abs(b.value)-Math.abs(a.value)
            );

            axis=axes[0].name;
            neutral=axes[0].value;

            calibrated=true;

            debug.textContent=
                `Calibrado (${axis.toUpperCase()})`;

            return;
        }

        let currentValue;

        if(axis==="x") currentValue=filteredX;
        if(axis==="y") currentValue=filteredY;
        if(axis==="z") currentValue=filteredZ;

        const delta=currentValue-neutral;

        debug.textContent=
            `Axis:${axis} Δ:${delta.toFixed(2)} Estado:${state}`;

        if(state==="WAIT_CENTER"){

            if(Math.abs(delta)<2){
                state="READY";
            }

            return;
        }

        if(state!=="READY"){
            return;
        }

        if(delta>5){

            state="WAIT_CENTER";

            registerAnswer("ok");

            return;
        }

        if(delta<-5){

            state="WAIT_CENTER";

            registerAnswer("skip");

            return;
        }

    });

    startGame();
}

document.getElementById("start").onclick=async()=>{

    try{

        if(
            typeof DeviceMotionEvent!=="undefined" &&
            typeof DeviceMotionEvent.requestPermission==="function"
        ){

            const permission=
                await DeviceMotionEvent.requestPermission();

            if(permission!=="granted"){
                return;
            }
        }

        enableSensors();

    }catch(err){

        console.error(err);

        alert("Erro ao acessar sensores.");
    }
};

</script>

</body>
</html>
