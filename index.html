<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quem Sou Eu?</title>

<style>

body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;
}

#app{
    width:100%;
    max-width:700px;
    padding:20px;
}

h1{
    font-size:60px;
    margin-bottom:30px;
}

p{
    font-size:20px;
}

select{
    width:280px;
    height:60px;
    font-size:22px;
    border-radius:10px;
    padding:10px;
    margin-top:20px;
}

button{
    margin-top:20px;
    width:180px;
    height:60px;
    font-size:22px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

</style>
</head>

<body>

<div id="app">

    <h1>Quem Sou Eu?</h1>

    <p>
        Incline para frente = Acertou<br>
        Incline para trás = Passou
    </p>

    <select id="cat">
        <option value="">Escolha uma categoria</option>
    </select>

    <br>

    <button id="start">
        Jogar
    </button>

</div>

<script>

const db = {

    Animais:[
        "Leão",
        "Elefante",
        "Cachorro"
    ],

    Filmes:[
        "Titanic",
        "Avatar",
        "Matrix"
    ],

    Comidas:[
        "Pizza",
        "Sushi",
        "Pastel"
    ],

    Objetos:[
        "Livro",
        "Caneta",
        "Celular"
    ]
};

const select = document.getElementById("cat");

Object.keys(db).forEach(categoria => {

    const option = document.createElement("option");

    option.value = categoria;
    option.textContent = categoria;

    select.appendChild(option);

});

document.getElementById("start").addEventListener("click", () => {

    if(!select.value){

        alert("Escolha uma categoria.");

        return;
    }

    alert("Categoria selecionada: " + select.value);

});

</script>

</body>
</html>
