<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quem Sou Eu</title>
<style>
body{margin:0;font-family:Arial;background:#111;color:#fff;overflow:hidden}
.screen{display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column;padding:20px;box-sizing:border-box}
.active{display:flex}button{padding:12px 22px;font-size:18px;border:0;border-radius:10px;background:#0a84ff;color:#fff}
#word{font-size:64px;text-align:center}#timer{position:absolute;top:20px;font-size:36px}
.ok{background:#1b5e20}.skip{background:#8b0000}
</style></head><body>
<div id="menu" class="screen active">
<h1>Quem Sou Eu?</h1>
<button onclick="startGame()">Iniciar</button>
</div>
<div id="game" class="screen">
<div id="timer"></div>
<h1 id="count"></h1>
<div id="word"></div>
</div>
<script>
const WORDS=["Cachorro","Gato","Leão","Brasil","Japão","Professor","Computador","Mesa","Elefante","Urso","Dentista","Chile"];
let idx=0,res=[],time=60,timer,started=false,neutral=false,base=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
async function startGame(){
 if(window.innerWidth>window.innerHeight){alert("Inicie com o celular em pé.");return;}
 if(typeof DeviceOrientationEvent!=="undefined"&&typeof DeviceOrientationEvent.requestPermission==="function"){try{await DeviceOrientationEvent.requestPermission();}catch(e){}}
 shuffle(WORDS);idx=0;res=[];time=60;
 show("game");
 let c=3;
 document.getElementById("count").textContent="Prepare-se";
 let i=setInterval(()=>{
   document.getElementById("count").textContent=c;
   c--;
   if(c<0){
      clearInterval(i);
      document.getElementById("count").textContent="";
      base=lastAngle;
      started=true;
      neutral=true;
      nextWord();
      document.getElementById("timer").textContent=time;
      timer=setInterval(()=>{document.getElementById("timer").textContent=--time;if(time<=0){clearInterval(timer);alert("Fim!");location.reload();}},1000);
   }
 },1000);
}
function nextWord(){document.body.className="";document.getElementById("word").textContent=WORDS[idx]||"Fim";}
function action(ok){
 if(!neutral)return;
 neutral=false;
 document.body.className=ok?"ok":"skip";
 idx++;
 setTimeout(()=>{nextWord();neutral=true;base=lastAngle;},350);
}
let lastAngle=0;
window.addEventListener("deviceorientation",e=>{
 let ang=(window.innerWidth>window.innerHeight)?e.gamma:e.beta;
 if(ang==null)return;
 lastAngle=ang;
 if(!started)return;
 let d=ang-base;
 if(Math.abs(d)<5)return;
 if(d>15){action(false);}
 if(d<-15){action(true);}
});
</script></body></html>
